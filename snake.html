<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>⚡ Neon Snake</title>
  <style>
    /* Moderne Dark Mode & Gecentreerde Layout */
    body {
      background-color: #0f172a; /* Diep donkerblauw/grijs */
      color: #f8fafc;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    h1 {
      font-size: 2.8rem;
      margin: 0 0 15px 0;
      font-weight: 800;
      letter-spacing: -1px;
      text-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Het Canvas met een vette Neon Glow */
    canvas {
      background-color: #1e293b;
      border: 4px solid #22c55e;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.2), 
                  inset 0 0 20px rgba(0, 0, 0, 0.6);
    }

    /* Instructies */
    p {
      color: #94a3b8;
      font-size: 1rem;
      margin-top: 15px;
      background: rgba(30, 41, 59, 0.5);
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Strakke Terug-knop */
    a {
      color: #22c55e;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      margin-top: 10px;
      transition: all 0.2s ease;
      padding: 6px 12px;
      border-radius: 6px;
    }

    a:hover {
      color: #4ade80;
      background: rgba(34, 197, 94, 0.1);
    }
  </style>
</head>
<body>

  <h1>🐍 Snake</h1>
  <canvas id="game" width="400" height="400"></canvas>

  <p>Gebruik de <b>pijltjestoetsen</b> om te sturen</p>
  <a href="index.html">← Terug naar menu</a>

  <script src="snake.js"></script>
</body>
</html>
