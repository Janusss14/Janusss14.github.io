<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧩 Tetris Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .tetris-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      max-width: 800px;
      width: 100%;
    }

    .tetris-header {
      text-align: center;
      margin-top: 20px;
    }

    .tetris-header h1 {
      font-size: 48px;
      margin-bottom: 10px;
      background: linear-gradient(45deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 18px;
      color: #94a3b8;
      font-weight: 300;
    }

    .game-wrapper {
      display: flex;
      gap: 30px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .game-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .stats-panel {
      background: rgba(15, 23, 42, 0.8);
      border: 2px solid #a78bfa;
      border-radius: 12px;
      padding: 20px;
      min-width: 180px;
      box-shadow: 0 0 20px rgba(167, 139, 250, 0.2);
    }

    .stat {
      margin-bottom: 20px;
      text-align: center;
    }

    .stat:last-child {
      margin-bottom: 0;
    }

    .stat-label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .stat-value {
      display: block;
      font-size: 32px;
      font-weight: bold;
      color: #a78bfa;
      text-shadow: 0 0 10px rgba(167, 139, 250, 0.5);
    }

    #tetrisCanvas {
      border: 3px solid #a78bfa;
      background: #0f172a;
      box-shadow: 0 0 30px rgba(167, 139, 250, 0.3);
      border-radius: 8px;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #nextCanvas {
      border: 2px solid #a78bfa;
      background: #0f172a;
      box-shadow: 0 0 20px rgba(167, 139, 250, 0.2);
      border-radius: 8px;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      margin-top: 10px;
    }

    .next-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #cbd5e1;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
    }

    .keyboard-hint {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 12px 20px;
      text-align: center;
      max-width: 500px;
    }

    .keyboard-hint p {
      font-size: 14px;
      color: #cbd5e1;
      margin: 0;
      line-height: 1.6;
    }

    .keyboard-hint strong {
      color: #a78bfa;
      font-weight: 600;
    }

    .button-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      max-width: 500px;
    }

    .btn {
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      min-width: 140px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #a78bfa, #ec4899);
      color: #0f172a;
      box-shadow: 0 0 20px rgba(167, 139, 250, 0.4);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(167, 139, 250, 0.6);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(30, 41, 59, 0.8);
      color: #cbd5e1;
      border: 2px solid #475569;
    }

    .btn-secondary:hover:not(:disabled) {
      border-color: #a78bfa;
      color: #a78bfa;
      background: rgba(30, 41, 59, 1);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .info-box {
      background: linear-gradient(135deg, rgba(167, 139, 250, 0.1), rgba(236, 72, 153, 0.1));
      border: 1px solid rgba(167, 139, 250, 0.3);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      max-width: 500px;
    }

    .info-box p {
      margin: 0;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.6;
    }

    .back-link {
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s ease;
      padding: 8px 16px;
      border-radius: 6px;
    }

    .back-link:hover {
      color: #a78bfa;
      background: rgba(167, 139, 250, 0.1);
    }

    @media (max-width: 768px) {
      .tetris-header h1 {
        font-size: 36px;
      }

      .game-wrapper {
        flex-direction: column;
        gap: 20px;
      }

      #tetrisCanvas {
        max-width: 100%;
      }

      .btn {
        min-width: 120px;
        padding: 10px 20px;
        font-size: 14px;
      }

      .stats-panel {
        min-width: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="tetris-container">
    <div class="tetris-header">
      <h1>🧩 Tetris</h1>
      <p class="subtitle">Klassieke blokken puzzel!</p>
    </div>

    <div class="game-wrapper">
      <div class="game-section">
        <canvas id="tetrisCanvas" width="200" height="400"></canvas>
      </div>

      <div class="stats-panel">
        <div class="stat">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Level</span>
          <span class="stat-value" id="level">1</span>
        </div>
        <div class="stat">
          <span class="stat-label">Lines</span>
          <span class="stat-value" id="lines">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">High Score</span>
          <span class="stat-value" id="highScore">0</span>
        </div>

        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #475569;">
          <p class="next-label">Volgende</p>
          <canvas id="nextCanvas" width="100" height="100"></canvas>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="keyboard-hint">
        <p>
          <strong>⬅️ ➡️</strong> Bewegen<br>
          <strong>⬇️</strong> Sneller vallen<br>
          <strong>Z / X</strong> Roteren<br>
          <strong>SPACEBAR</strong> Direct naar beneden
        </p>
      </div>
      <div class="button-group">
        <button id="startBtn" class="btn btn-primary">Start Game</button>
        <button id="pauseBtn" class="btn btn-secondary" disabled>Pauze</button>
        <button id="resetBtn" class="btn btn-secondary">Reset</button>
      </div>
    </div>

    <div class="info-box">
      <p>🎯 Vul rijen in om ze weg te halen! Hoe meer rijen tegelijk, hoe meer punten!</p>
    </div>

    <a href="index.html" class="back-link">⬅️ Terug naar Home</a>
  </div>

  <script src="tetris.js"></script>
</body>
</html>
